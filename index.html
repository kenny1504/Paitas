<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso | Radio Futura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/tailwind.generated.css">
  <style>
    :root {
      --bg: #d4e5f7;
      --panel: rgba(248, 251, 255, 0.9);
      --line: rgba(53, 111, 186, 0.14);
      --text: #14365c;
      --muted: #58708e;
      --accent: #1f5faa;
      --warm: #e0ab2f;
      --shadow: 0 24px 52px rgba(60, 104, 163, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Outfit", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(86, 163, 236, 0.2), transparent 22%),
        radial-gradient(circle at top right, rgba(241, 197, 88, 0.12), transparent 16%),
        linear-gradient(180deg, #e7f1fb 0%, #d4e5f7 45%, #cddff2 100%);
      animation: page-fade-in 520ms ease both;
    }

    .login-shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(340px, 0.8fr);
      gap: 28px;
      align-items: center;
      padding: 32px 0;
    }

    .brand-panel,
    .login-panel {
      border: 1px solid var(--line);
      border-radius: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      animation: rise-in 540ms ease both;
    }

    .brand-panel {
      padding: 34px;
      background:
        radial-gradient(circle at 14% 18%, rgba(255, 255, 255, 0.5), transparent 18%),
        linear-gradient(135deg, rgba(245, 250, 255, 0.92), rgba(219, 236, 252, 0.88) 62%, rgba(168, 210, 247, 0.76) 100%);
    }

    .brand-logos {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }

    .brand-logos img:first-child {
      width: 154px;
    }

    .brand-logos img:last-child {
      width: 138px;
    }

    .eyebrow {
      display: inline-flex;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid rgba(233, 185, 63, 0.28);
      background: rgba(255, 248, 228, 0.92);
      color: #c33d18;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    h1,
    h2 {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
    }

    .brand-panel h1 {
      margin-top: 18px;
      font-size: clamp(2.4rem, 4vw, 4rem);
      line-height: 0.98;
      letter-spacing: -0.04em;
    }

    .brand-panel p {
      max-width: 56ch;
      margin: 16px 0 0;
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.55;
    }

    .login-panel {
      padding: 28px;
      background: linear-gradient(145deg, rgba(245, 250, 255, 0.9), rgba(233, 243, 253, 0.84));
    }

    .login-panel h2 {
      font-size: 2rem;
    }

    .login-panel p {
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .login-form {
      display: grid;
      gap: 16px;
      margin-top: 24px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      font-size: 0.92rem;
      color: var(--muted);
    }

    .field input {
      width: 100%;
      min-height: 52px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--text);
      font: inherit;
      outline: none;
      transition: box-shadow 180ms ease, border-color 180ms ease, transform 180ms ease;
    }

    .field input:focus {
      border-color: rgba(31, 95, 170, 0.28);
      box-shadow: 0 0 0 4px rgba(31, 95, 170, 0.08);
      transform: translateY(-1px);
    }

    .password-field {
      position: relative;
    }

    .password-field input {
      padding-right: 112px;
    }

    .password-toggle {
      position: absolute;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      min-height: 36px;
      padding: 0 14px;
      border: 1px solid rgba(31, 95, 170, 0.12);
      border-radius: 999px;
      background: rgba(245, 250, 255, 0.88);
      color: var(--accent);
      font: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .password-toggle:hover {
      transform: translateY(-50%) translateY(-1px);
      border-color: rgba(31, 95, 170, 0.22);
      background: rgba(255, 255, 255, 0.96);
    }

    .login-button {
      min-height: 52px;
      border: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, #1f5faa 0%, #2e70c0 100%);
      color: #ffffff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(31, 95, 170, 0.18);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .login-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 30px rgba(31, 95, 170, 0.22);
    }

    .login-alert {
      min-height: 22px;
      color: #9d5d0e;
      font-size: 0.92rem;
    }

    .login-note {
      margin-top: 18px;
      padding: 14px 16px;
      border: 1px solid rgba(53, 111, 186, 0.12);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.56);
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.5;
    }

    @keyframes page-fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes rise-in {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 920px) {
      .login-shell {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="login-shell">
    <section class="brand-panel">
      <div class="brand-logos">
        <img data-site-asset="futuraLogo" alt="Radio Futura">
        <img data-site-asset="tuSpotLogo" alt="Tu Spot en la Radio">
      </div>
      <span class="eyebrow">Acceso al sistema</span>
      <h1>Ingresa al panel comercial</h1>
      <p>
        Accede como administrador, ejecutivo o cliente externo desde una sola entrada protegida.
      </p>
    </section>

    <section class="login-panel">
      <h2>Iniciar sesion</h2>
      <p>Ingresa tus credenciales para continuar al entorno administrativo o al dashboard de cliente.</p>

      <form id="loginForm" class="login-form">
        <div class="field">
          <label for="username">Usuario</label>
          <input id="username" name="username" type="text" autocomplete="username" required>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="password-field">
            <input id="password" name="password" type="password" autocomplete="current-password" required>
            <button id="togglePassword" type="button" class="password-toggle">Mostrar</button>
          </div>
        </div>

        <div id="loginAlert" class="login-alert"></div>
        <button type="submit" class="login-button">Acceder</button>
      </form>
     
    </section>
  </main>

  <script type="module" src="./assets/js/login.js"></script>
  <script type="module" src="./assets/js/site-assets.js"></script>
</body>
</html>
